<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Cards | ALDLAS</title>
    <script src="js/devtools-guard.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-a: #070a11;
            --bg-b: #0a0f1a;
            --bg-c: #101522;
            --line: rgba(183, 220, 255, 0.22);
            --line-strong: rgba(122, 209, 255, 0.48);
            --text-main: #e8f2ff;
            --text-soft: #9fb4cd;
            --gold: #ffd58f;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            position: relative;
            background:
                radial-gradient(circle at 14% 18%, rgba(70, 180, 255, 0.16), transparent 32%),
                radial-gradient(circle at 86% 16%, rgba(255, 208, 126, 0.11), transparent 36%),
                linear-gradient(165deg, var(--bg-a) 0%, var(--bg-b) 46%, var(--bg-c) 100%);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            padding: 30px 14px 38px;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: -20% -15%;
            background:
                repeating-linear-gradient(
                    120deg,
                    rgba(255,255,255,0.016) 0,
                    rgba(255,255,255,0.016) 2px,
                    transparent 2px,
                    transparent 34px
                );
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, transparent 25%, rgba(0,0,0,0.65) 100%);
            pointer-events: none;
            z-index: 0;
        }
        .plexus-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.52;
        }
        .wrap {
            position: relative;
            z-index: 2;
            max-width: 1080px;
            margin: 0 auto;
        }
        .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
            padding: 14px 16px;
            background: linear-gradient(145deg, rgba(14, 21, 33, 0.74), rgba(10, 15, 25, 0.7));
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow:
                0 16px 30px rgba(0,0,0,0.36),
                inset 0 0 0 1px rgba(255,255,255,0.04);
        }
        .title {
            margin: 0;
            font-family: 'Cinzel', serif;
            letter-spacing: 1.2px;
            font-size: clamp(1.16rem, 2.8vw, 1.86rem);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 22px rgba(122, 209, 255, 0.22);
        }
        .title i {
            color: var(--gold);
            filter: drop-shadow(0 0 6px rgba(255, 208, 136, 0.3));
        }
        .head-sub {
            margin-top: 5px;
            color: var(--text-soft);
            letter-spacing: 0.3px;
            font-size: 0.9rem;
        }
        .btn {
            border: 1px solid var(--line);
            background:
                linear-gradient(150deg, rgba(17, 25, 38, 0.94), rgba(14, 20, 31, 0.92)),
                rgba(255,255,255,0.04);
            color: #dce9f8;
            border-radius: 10px;
            padding: 10px 14px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.22);
        }
        .btn:hover {
            border-color: var(--line-strong);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 14px 26px rgba(0,0,0,0.3);
        }
        .grid {
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            gap: 16px;
        }
        .card {
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at 10% 0%, rgba(122, 209, 255, 0.12), transparent 36%),
                linear-gradient(162deg, rgba(13, 19, 30, 0.88), rgba(8, 13, 23, 0.88));
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 17px;
            box-shadow:
                0 18px 34px rgba(0,0,0,0.42),
                inset 0 0 0 1px rgba(255,255,255,0.04);
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(143, 230, 255, 0.9), transparent);
            opacity: 0.82;
        }
        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .card h3 {
            margin: 0 0 13px 0;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.8px;
            font-size: 1.02rem;
            color: #f4f8ff;
            text-shadow: 0 0 12px rgba(148, 210, 255, 0.1);
        }
        .profile-line {
            color: #aac0d9;
            font-size: 0.95rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 7px;
            letter-spacing: 0.2px;
        }
        .profile-line strong {
            color: #ecf5ff;
        }
        .profile-line i {
            width: 16px;
            color: rgba(141, 222, 255, 0.9);
            filter: drop-shadow(0 0 7px rgba(122, 209, 255, 0.36));
        }
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.22);
            padding: 4px 11px;
            font-size: 0.74rem;
            letter-spacing: 0.45px;
            font-weight: 700;
        }
        .pill.vip {
            color: #ffe0ab;
            border-color: rgba(246,196,83,0.5);
            background: linear-gradient(120deg, rgba(246,196,83,0.2), rgba(255, 149, 79, 0.16));
            box-shadow: 0 0 14px rgba(246, 196, 83, 0.18);
        }
        .pill.free {
            color: #8fe8bd;
            border-color: rgba(0,255,136,0.4);
            background: linear-gradient(120deg, rgba(0,255,136,0.15), rgba(78, 214, 255, 0.12));
            box-shadow: 0 0 14px rgba(0, 255, 136, 0.12);
        }
        .panel-hint {
            margin-top: -3px;
            margin-bottom: 8px;
            color: var(--text-soft);
            font-size: 0.88rem;
            line-height: 1.35;
        }
        .field {
            display: grid;
            gap: 7px;
            margin-bottom: 12px;
        }
        .field label {
            color: #a8bdd5;
            font-size: 0.8rem;
            letter-spacing: 0.62px;
            text-transform: uppercase;
        }
        .field input {
            width: 100%;
            background: linear-gradient(165deg, rgba(0, 0, 0, 0.36), rgba(10, 17, 28, 0.4));
            border: 1px solid rgba(146, 182, 217, 0.26);
            color: #eaf2fd;
            border-radius: 10px;
            padding: 12px 13px;
            outline: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            transition: 0.2s ease;
        }
        .field input:focus {
            border-color: var(--line-strong);
            box-shadow: 0 0 0 2px rgba(122, 209, 255, 0.14), 0 0 22px rgba(122, 209, 255, 0.12);
        }
        .actions {
            display: flex;
            gap: 9px;
            flex-wrap: wrap;
        }
        .btn-primary {
            border: 1px solid rgba(104, 255, 185, 0.72);
            background:
                radial-gradient(circle at 22% 20%, rgba(170, 255, 219, 0.22), transparent 42%),
                linear-gradient(140deg, rgba(0,176,110,0.94), rgba(0,128,80,0.95));
            color: #f4fff9;
            box-shadow:
                0 10px 24px rgba(0, 172, 107, 0.33),
                inset 0 0 0 1px rgba(255,255,255,0.16);
        }
        .status {
            margin-top: 12px;
            color: #8ea4bb;
            min-height: 24px;
            font-size: 0.92rem;
            line-height: 1.4;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 9px 10px;
        }
        .history-empty {
            color: #93a7bd;
            font-size: 0.92rem;
        }
        .history-list {
            display: grid;
            gap: 10px;
        }
        .history-item {
            position: relative;
            border: 1px solid rgba(151, 190, 227, 0.24);
            border-radius: 11px;
            background: linear-gradient(145deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
            padding: 11px;
            overflow: hidden;
        }
        .history-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(122, 209, 255, 0.1), transparent 45%, rgba(255, 209, 138, 0.06));
            pointer-events: none;
        }
        .history-code {
            font-family: monospace;
            color: #93ffd3;
            font-weight: 700;
            letter-spacing: 0.55px;
            font-size: 0.95rem;
            text-shadow: 0 0 10px rgba(122, 255, 199, 0.2);
        }
        .history-meta {
            margin-top: 4px;
            color: #a4bad2;
            font-size: 0.86rem;
            line-height: 1.4;
        }
        .card-history {
            margin-top: 16px;
        }
        .head-left {
            min-width: 0;
        }
        @media (max-width: 880px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .head {
                flex-direction: column;
                align-items: flex-start;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
            .actions .btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <canvas id="plexus-canvas" class="plexus-canvas" aria-hidden="true"></canvas>
    <div class="wrap">
        <div class="head">
            <div class="head-left">
                <h1 class="title"><i class="fas fa-gift"></i> Gift Cards</h1>
                <div class="head-sub">Canje seguro de beneficios para tu cuenta.</div>
            </div>
            <a class="btn" href="foro.html"><i class="fas fa-arrow-left"></i> Volver al foro</a>
        </div>

        <div class="grid">
            <section class="card">
                <h3><i class="fas fa-user-shield"></i> Mi perfil</h3>
                <div class="profile-line"><i class="fas fa-id-badge"></i> Usuario: <strong id="profile-username">-</strong></div>
                <div class="profile-line"><i class="fas fa-shield-halved"></i> Estado: <span id="profile-vip-pill" class="pill free">FREE</span></div>
                <div class="profile-line"><i class="fas fa-crown"></i> Plan: <strong id="profile-plan">FREE</strong></div>
                <div class="profile-line"><i class="fas fa-hourglass-half"></i> Vencimiento: <strong id="profile-expiry">Permanente</strong></div>
                <div class="profile-line"><i class="fas fa-coins"></i> Saldo actual: <strong id="profile-credits">0</strong> creditos</div>
            </section>

            <section class="card">
                <h3><i class="fas fa-gift"></i> Canjear gift</h3>
                <div class="panel-hint">Ingresa el codigo y desbloquea creditos o suscripcion VIP al momento.</div>
                <div class="field">
                    <label for="gift-code-input">Codigo gift card</label>
                    <input id="gift-code-input" type="text" placeholder="VIP-XXXX-XXXX o CRD-XXXX-XXXX" autocomplete="off">
                </div>
                <div class="actions">
                    <button id="redeem-btn" class="btn btn-primary" type="button"><i class="fas fa-bolt"></i> Canjear</button>
                    <button id="clear-btn" class="btn" type="button"><i class="fas fa-eraser"></i> Limpiar</button>
                </div>
                <div id="redeem-status" class="status"></div>
            </section>
        </div>

        <section class="card card-history">
            <h3><i class="fas fa-scroll"></i> Mis canjes recientes</h3>
            <div id="history-wrap"></div>
        </section>
    </div>

    <script>
        const CURRENT_USER_KEY = 'mb_current_user';
        const CURRENT_PROFILE_KEY = 'mb_current_user_profile';
        const USER_CSRF_HEADER_NAME = 'x-user-csrf-token';

        const VIP_PLAN_LABELS = {
            vip: 'VIP',
            pro: 'PRO',
            elite: 'ELITE',
            black: 'BLACK',
            god: 'GOD'
        };

        let currentUserProfile = null;
        let userCsrfToken = '';
        let currentWalletBalance = 0;
        let giftHistory = [];

        function getCurrentUsername() {
            if (currentUserProfile && currentUserProfile.username) {
                return String(currentUserProfile.username).trim();
            }
            return String(localStorage.getItem(CURRENT_USER_KEY) || '').trim();
        }

        function persistCurrentProfile(profile) {
            const safeProfile = profile && typeof profile === 'object' ? profile : {};
            currentUserProfile = safeProfile;
            const username = String(safeProfile.username || '').trim();
            if (username) {
                localStorage.setItem(CURRENT_USER_KEY, username);
            }
            localStorage.setItem(CURRENT_PROFILE_KEY, JSON.stringify(safeProfile));
        }

        function getApiBaseCandidates() {
            const configuredBase = (localStorage.getItem('mb_api_base_url') || '').trim().replace(/\/$/, '');
            const candidates = [];
            if (configuredBase) candidates.push(configuredBase);
            candidates.push('');
            const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:';
            if (isLocal) {
                candidates.push('http://127.0.0.1:8000');
                candidates.push('http://localhost:8000');
            }
            return { configuredBase, candidates: Array.from(new Set(candidates)) };
        }

        async function userApiRequest(path, options = {}) {
            const method = options.method || 'GET';
            const body = options.body !== undefined ? options.body : undefined;
            const includeCsrf = options.includeCsrf === true;
            const { configuredBase, candidates } = getApiBaseCandidates();
            let lastError = null;

            for (const base of candidates) {
                const endpoint = `${base}${path}`;
                try {
                    const headers = {};
                    if (body !== undefined) {
                        headers['Content-Type'] = 'application/json';
                    }
                    if (includeCsrf && userCsrfToken) {
                        headers[USER_CSRF_HEADER_NAME] = userCsrfToken;
                    }
                    const res = await fetch(endpoint, {
                        method,
                        cache: 'no-store',
                        credentials: 'include',
                        headers,
                        body: body !== undefined ? JSON.stringify(body) : undefined
                    });
                    let payload = null;
                    try {
                        payload = await res.json();
                    } catch (e) {
                        payload = null;
                    }
                    if (!res.ok) {
                        const message = payload && payload.detail ? payload.detail : `Error HTTP ${res.status}`;
                        const err = new Error(`${message}${base ? ` (${endpoint})` : ''}`);
                        if (res.status === 404 || res.status === 405) {
                            lastError = err;
                            continue;
                        }
                        throw err;
                    }
                    if (base && base !== configuredBase) {
                        localStorage.setItem('mb_api_base_url', base);
                    }
                    return payload || {};
                } catch (err) {
                    lastError = err;
                }
            }
            throw lastError || new Error('No se pudo conectar con el backend.');
        }

        async function fetchUserSessionState() {
            const payload = await userApiRequest('/api/auth/user/session');
            const authenticated = !!(payload && payload.authenticated === true && payload.user && payload.user.username);
            if (!authenticated) {
                return { authenticated: false };
            }
            return {
                authenticated: true,
                user: payload.user,
                csrfToken: String(payload.csrf_token || '').trim()
            };
        }

        function setStatus(message, tone) {
            const statusEl = document.getElementById('redeem-status');
            if (!statusEl) return;
            const palette = {
                neutral: '#8ea4bb',
                success: '#00ff88',
                error: '#ff7f7f'
            };
            statusEl.textContent = message || '';
            statusEl.style.color = palette[tone] || palette.neutral;
        }

        function formatDateTime(text) {
            const dt = new Date(text);
            if (Number.isNaN(dt.getTime())) return '-';
            return dt.toLocaleString('es-MX');
        }

        function describeGift(entry) {
            if (entry.kind === 'credits') {
                return `+${Number(entry.credits || 0)} creditos`;
            }
            const label = VIP_PLAN_LABELS[entry.plan] || 'VIP';
            return `${label} x ${Number(entry.days || 0)} dias`;
        }

        function initPlexusBackground() {
            const canvas = document.getElementById('plexus-canvas');
            if (!canvas || canvas.dataset.bound === 'true') return;
            canvas.dataset.bound = 'true';

            const ctx = canvas.getContext('2d');
            if (!ctx) return;

            const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const state = {
                width: 0,
                height: 0,
                dpr: 1,
                raf: 0,
                nodes: []
            };

            const randomBetween = (min, max) => min + Math.random() * (max - min);
            const makeNode = () => {
                const speedFactor = reduceMotion ? 0.16 : 0.42;
                const theta = randomBetween(0, Math.PI * 2);
                return {
                    x: randomBetween(0, state.width || window.innerWidth),
                    y: randomBetween(0, state.height || window.innerHeight),
                    vx: Math.cos(theta) * randomBetween(0.15, speedFactor),
                    vy: Math.sin(theta) * randomBetween(0.15, speedFactor),
                    r: randomBetween(1.0, 2.0)
                };
            };

            const syncSize = () => {
                state.width = window.innerWidth;
                state.height = window.innerHeight;
                state.dpr = Math.min(window.devicePixelRatio || 1, 1.75);
                canvas.width = Math.floor(state.width * state.dpr);
                canvas.height = Math.floor(state.height * state.dpr);
                ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);

                const target = Math.max(26, Math.min(90, Math.round((state.width * state.height) / 26000)));
                if (state.nodes.length === 0) {
                    state.nodes = Array.from({ length: reduceMotion ? Math.round(target * 0.55) : target }, makeNode);
                } else if (state.nodes.length < target) {
                    while (state.nodes.length < target) state.nodes.push(makeNode());
                } else if (state.nodes.length > target) {
                    state.nodes.length = target;
                }
            };

            const drawFrame = () => {
                ctx.clearRect(0, 0, state.width, state.height);

                const maxDist = reduceMotion ? 118 : 145;
                const maxDistSq = maxDist * maxDist;

                for (let i = 0; i < state.nodes.length; i += 1) {
                    const n = state.nodes[i];
                    n.x += n.vx;
                    n.y += n.vy;

                    if (n.x < -8 || n.x > state.width + 8) n.vx *= -1;
                    if (n.y < -8 || n.y > state.height + 8) n.vy *= -1;
                }

                for (let i = 0; i < state.nodes.length; i += 1) {
                    const a = state.nodes[i];
                    for (let j = i + 1; j < state.nodes.length; j += 1) {
                        const b = state.nodes[j];
                        const dx = a.x - b.x;
                        const dy = a.y - b.y;
                        const distSq = dx * dx + dy * dy;
                        if (distSq > maxDistSq) continue;
                        const ratio = 1 - (distSq / maxDistSq);
                        ctx.strokeStyle = `rgba(88, 246, 187, ${ratio * 0.32})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(a.x, a.y);
                        ctx.lineTo(b.x, b.y);
                        ctx.stroke();
                    }
                }

                for (let i = 0; i < state.nodes.length; i += 1) {
                    const n = state.nodes[i];
                    ctx.fillStyle = 'rgba(128, 249, 203, 0.72)';
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (!reduceMotion) {
                    state.raf = requestAnimationFrame(drawFrame);
                }
            };

            syncSize();
            drawFrame();
            window.addEventListener('resize', syncSize, { passive: true });
        }

        async function loadWalletAndHistory() {
            const [walletPayload, historyPayload] = await Promise.all([
                userApiRequest('/api/user/wallet'),
                userApiRequest('/api/user/gifts/history')
            ]);
            currentWalletBalance = Math.max(0, Number(walletPayload && walletPayload.balance ? walletPayload.balance : 0));
            const historySource = historyPayload && Array.isArray(historyPayload.history) ? historyPayload.history : [];
            giftHistory = historySource
                .filter((entry) => entry && typeof entry === 'object')
                .sort((a, b) => new Date(String(b.usedAt || '')).getTime() - new Date(String(a.usedAt || '')).getTime())
                .slice(0, 15);
        }

        function refreshProfile() {
            const username = getCurrentUsername();
            const user = currentUserProfile || {};
            const credits = Math.max(0, Math.round(Number(currentWalletBalance || 0)));

            const usernameEl = document.getElementById('profile-username');
            const vipPill = document.getElementById('profile-vip-pill');
            const planEl = document.getElementById('profile-plan');
            const expiryEl = document.getElementById('profile-expiry');
            const creditsEl = document.getElementById('profile-credits');

            if (usernameEl) usernameEl.textContent = username || '-';
            if (creditsEl) creditsEl.textContent = credits.toLocaleString('es-MX');

            const isVip = !!(user && user.isVip === true);
            if (vipPill) {
                vipPill.className = `pill ${isVip ? 'vip' : 'free'}`;
                vipPill.textContent = isVip ? 'VIP' : 'FREE';
            }
            if (planEl) {
                const rawPlan = String(user && user.plan ? user.plan : (isVip ? 'vip' : 'free')).toLowerCase();
                planEl.textContent = VIP_PLAN_LABELS[rawPlan] || rawPlan.toUpperCase();
            }
            if (expiryEl) {
                expiryEl.textContent = user && user.expiryDate ? user.expiryDate : 'Permanente';
            }
        }

        function renderHistory() {
            const wrap = document.getElementById('history-wrap');
            if (!wrap) return;

            if (!giftHistory.length) {
                wrap.innerHTML = '<div class="history-empty">Aun no has canjeado gifts.</div>';
                return;
            }

            wrap.innerHTML = `<div class="history-list">${giftHistory.map((entry) => `
                <article class="history-item">
                    <div class="history-code">${entry.code}</div>
                    <div class="history-meta">${describeGift(entry)}</div>
                    <div class="history-meta">Canjeado: ${formatDateTime(entry.usedAt)}</div>
                </article>
            `).join('')}</div>`;
        }

        async function redeemGiftCode() {
            const input = document.getElementById('gift-code-input');
            const code = String(input && input.value ? input.value : '').trim().toUpperCase();
            if (!code) {
                setStatus('Ingresa un codigo gift primero.', 'error');
                return;
            }

            try {
                const payload = await userApiRequest('/api/user/gifts/redeem', {
                    method: 'POST',
                    body: { code },
                    includeCsrf: true
                });

                if (payload && payload.user) {
                    persistCurrentProfile(payload.user);
                }
                currentWalletBalance = Math.max(
                    0,
                    Number(payload && payload.wallet_balance !== undefined ? payload.wallet_balance : currentWalletBalance)
                );
                if (payload && payload.gift) {
                    giftHistory = [payload.gift, ...giftHistory.filter((entry) => String(entry.code || '').toUpperCase() !== String(payload.gift.code || '').toUpperCase())]
                        .slice(0, 15);
                }

                refreshProfile();
                renderHistory();

                const redeemed = payload && payload.redeemed ? payload.redeemed : {};
                if (String(redeemed.kind || '').toLowerCase() === 'credits') {
                    const added = Math.max(0, Number(redeemed.credits || 0));
                    setStatus(`Canje completado: +${added} creditos en tu saldo.`, 'success');
                } else {
                    const rawPlan = String(redeemed.plan || 'vip').toLowerCase();
                    const planLabel = VIP_PLAN_LABELS[rawPlan] || rawPlan.toUpperCase();
                    const days = Math.max(1, Number(redeemed.days || 0));
                    const expiry = String(redeemed.expiryDate || '-');
                    setStatus(`Canje completado: ${planLabel} por ${days} dias. Vence: ${expiry}.`, 'success');
                }
                if (input) input.value = '';
            } catch (err) {
                setStatus(`No se pudo canjear: ${err && err.message ? err.message : 'error desconocido'}`, 'error');
            }
        }

        async function boot() {
            initPlexusBackground();

            if (location.protocol === 'file:') {
                window.location.href = 'index.html';
                return;
            }

            const session = await fetchUserSessionState();
            if (!session || !session.authenticated || !session.user) {
                window.location.href = 'index.html';
                return;
            }
            userCsrfToken = String(session.csrfToken || '').trim();
            persistCurrentProfile(session.user);

            await loadWalletAndHistory();

            const input = document.getElementById('gift-code-input');
            const redeemBtn = document.getElementById('redeem-btn');
            const clearBtn = document.getElementById('clear-btn');

            refreshProfile();
            renderHistory();
            setStatus('Dashboard listo para canjear tus gifts.', 'neutral');

            if (input && !input.dataset.bound) {
                input.dataset.bound = 'true';
                input.addEventListener('input', () => {
                    input.value = String(input.value || '').toUpperCase().replace(/\s+/g, '');
                });
                input.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        redeemGiftCode();
                    }
                });
            }
            if (redeemBtn && !redeemBtn.dataset.bound) {
                redeemBtn.dataset.bound = 'true';
                redeemBtn.addEventListener('click', redeemGiftCode);
            }
            if (clearBtn && !clearBtn.dataset.bound) {
                clearBtn.dataset.bound = 'true';
                clearBtn.addEventListener('click', () => {
                    if (input) input.value = '';
                    setStatus('Campo limpiado.', 'neutral');
                    if (input) input.focus();
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            boot().catch((err) => {
                setStatus(`No se pudo iniciar el dashboard: ${err && err.message ? err.message : 'error desconocido'}`, 'error');
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
